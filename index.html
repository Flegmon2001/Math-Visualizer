<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Graphing Studio</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

<style>
:root {
    --bg: #0b0d12;
    --panel: #111522;
    --panel2: #151a2a;
    --text: #e6e6e6;
    --muted: #8a8f98;
    --accent: #4c7dff;
}

body {
    margin: 0;
    font-family: system-ui;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
}

#layout {
    display: flex;
    height: 100vh;
}

/* Sidebar */
#sidebar {
    width: 320px;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    padding: 12px;
    box-sizing: border-box;
    border-right: 1px solid #222;
}

#title {
    font-size: 18px;
    margin-bottom: 10px;
    font-weight: 600;
}

#inputRow {
    display: flex;
    gap: 6px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: var(--panel2);
    color: white;
    outline: none;
}

button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
    font-weight: bold;
}

#list {
    margin-top: 12px;
    overflow-y: auto;
}

.item {
    background: var(--panel2);
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.left {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.expr {
    font-size: 14px;
}

.color {
    width: 14px;
    height: 14px;
    border-radius: 3px;
}

.small {
    font-size: 12px;
    color: var(--muted);
}

/* Canvas */
#canvas {
    flex: 1;
    display: block;
}
</style>
</head>

<body>

<div id="layout">

    <div id="sidebar">
        <div id="title">Graphing Studio</div>

        <div id="inputRow">
            <input id="expr" placeholder="e.g. sin(x), x^2, x+sin(x)" />
            <button onclick="add()">+</button>
        </div>

        <div id="list"></div>
    </div>

    <canvas id="c"></canvas>

</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W, H;
function resize(){
    W = canvas.width = window.innerWidth - 320;
    H = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// View
let scale = 60;
let offsetX = W/2;
let offsetY = H/2;

// Graph list
let graphs = [];

const colors = ["#4c7dff","#ff4c7d","#4cff9a","#ffb84c","#c44cff"];

function add(){
    const val = document.getElementById("expr").value;
    if(!val) return;

    try {
        graphs.push({
            expr: val,
            compiled: math.compile(val),
            visible: true,
            color: colors[graphs.length % colors.length]
        });

        document.getElementById("expr").value = "";
        renderList();
        draw();

    } catch(e){
        alert("Invalid expression");
    }
}

// Sidebar UI
function renderList(){
    const list = document.getElementById("list");
    list.innerHTML = "";

    graphs.forEach((g, i)=>{

        const item = document.createElement("div");
        item.className = "item";

        const left = document.createElement("div");
        left.className = "left";

        const expr = document.createElement("div");
        expr.className = "expr";
        expr.textContent = g.expr;

        const small = document.createElement("div");
        small.className = "small";
        small.textContent = "click to toggle";

        left.appendChild(expr);
        left.appendChild(small);

        const color = document.createElement("div");
        color.className = "color";
        color.style.background = g.color;

        item.appendChild(left);
        item.appendChild(color);

        item.onclick = ()=>{
            g.visible = !g.visible;
            item.style.opacity = g.visible ? 1 : 0.4;
            draw();
        };

        item.oncontextmenu = (e)=>{
            e.preventDefault();
            graphs.splice(i,1);
            renderList();
            draw();
        };

        list.appendChild(item);
    });
}

// Grid
function grid(){
    ctx.strokeStyle = "#1a2030";
    ctx.lineWidth = 1;

    for(let x = offsetX % scale; x < W; x += scale){
        ctx.beginPath();
        ctx.moveTo(x,0);
        ctx.lineTo(x,H);
        ctx.stroke();
    }

    for(let y = offsetY % scale; y < H; y += scale){
        ctx.beginPath();
        ctx.moveTo(0,y);
        ctx.lineTo(W,y);
        ctx.stroke();
    }

    // axes
    ctx.strokeStyle = "#444";
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.moveTo(0,offsetY);
    ctx.lineTo(W,offsetY);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(offsetX,0);
    ctx.lineTo(offsetX,H);
    ctx.stroke();
}

// Plot
function plot(g){
    ctx.strokeStyle = g.color;
    ctx.lineWidth = 2;
    ctx.beginPath();

    let first = true;

    for(let px = 0; px < W; px++){

        let x = (px - offsetX) / scale;
        let y;

        try {
            y = g.compiled.evaluate({ x });
        } catch {
            continue;
        }

        let py = offsetY - y * scale;

        if(first){
            ctx.moveTo(px, py);
            first = false;
        } else {
            ctx.lineTo(px, py);
        }
    }

    ctx.stroke();
}

// Draw
function draw(){
    ctx.clearRect(0,0,W,H);

    grid();

    graphs.forEach(g=>{
        if(g.visible) plot(g);
    });
}

draw();

// Zoom
canvas.addEventListener("wheel",(e)=>{
    e.preventDefault();
    scale *= e.deltaY < 0 ? 1.1 : 0.9;
    draw();
});

// Pan
let drag = false;
let lx, ly;

canvas.addEventListener("mousedown",(e)=>{
    drag = true;
    lx = e.clientX;
    ly = e.clientY;
});

canvas.addEventListener("mouseup",()=>drag=false);

canvas.addEventListener("mousemove",(e)=>{
    if(!drag) return;

    offsetX += e.clientX - lx;
    offsetY += e.clientY - ly;

    lx = e.clientX;
    ly = e.clientY;

    draw();
});
</script>

</body>
</html>
