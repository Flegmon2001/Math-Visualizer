<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Graphing Studio (Full Fixed)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

<style>
:root{
    --bg:#0b0d12;
    --panel:#121725;
    --panel2:#171c2d;
    --text:#eaeaea;
    --accent:#4c7dff;
}

body{
    margin:0;
    font-family:system-ui;
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
}

#wrap{
    display:flex;
    height:100vh;
}

#panel{
    width:340px;
    background:var(--panel);
    padding:12px;
    box-sizing:border-box;
    border-right:1px solid #222;
}

#title{
    font-size:18px;
    margin-bottom:10px;
}

#inputRow{
    display:flex;
    gap:6px;
}

input{
    flex:1;
    padding:10px;
    border-radius:8px;
    border:none;
    outline:none;
    background:var(--panel2);
    color:white;
}

button{
    padding:10px;
    border-radius:8px;
    border:none;
    background:var(--accent);
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.item{
    background:var(--panel2);
    padding:10px;
    border-radius:10px;
    margin-top:8px;
    cursor:pointer;
    user-select:none;
}

.small{
    font-size:12px;
    opacity:0.7;
}

canvas{
    flex:1;
    display:block;
}
</style>
</head>

<body>

<div id="wrap">

<div id="panel">

    <div id="title">Graphing Studio</div>

    <div id="inputRow">
        <input
            id="expr"
            placeholder="sin(x) OR x=t*cos(t), y=t*sin(t)"
        />
        <button onclick="add()">+</button>
    </div>

    <div id="list"></div>

</div>

<canvas id="c"></canvas>

</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

/* ================= SIZE ================= */

let W,H;

function resize(){
    W = canvas.width = window.innerWidth - 340;
    H = canvas.height = window.innerHeight;
    draw();
}

window.addEventListener("resize", resize);
resize();

/* ================= VIEW ================= */

let scale = 60;
let offsetX = W / 2;
let offsetY = H / 2;

/* ================= DATA ================= */

let graphs = [];

const colors = [
    "#4c7dff",
    "#ff4c7d",
    "#4cff9a",
    "#ffb84c",
    "#c44cff",
    "#00d4ff",
    "#ff6666"
];

/* ================= HELPERS ================= */

function normalize(str){
    return str
        .replace(/\n/g,",")
        .replace(/\s/g,"");
}

/* ================= PARAMETRIC PARSER ================= */

function parseParametric(input){

    input = normalize(input);

    const parts = input.split(",");

    let xPart = null;
    let yPart = null;

    for(const p of parts){

        if(p.startsWith("x=")){
            xPart = p.slice(2);
        }

        if(p.startsWith("y=")){
            yPart = p.slice(2);
        }
    }

    if(!xPart || !yPart){
        throw new Error("Invalid parametric");
    }

    return {
        xExpr: math.compile(xPart),
        yExpr: math.compile(yPart)
    };
}

/* ================= ADD GRAPH ================= */

function add(){

    let rawInput =
        document.getElementById("expr").value.trim();

    if(!rawInput) return;

    let input = normalize(rawInput);

    try{

        /* PARAMETRIC */

        if(
            input.includes("x=") &&
            input.includes("y=")
        ){

            const {xExpr, yExpr} =
                parseParametric(input);

            graphs.push({
                type:"parametric",
                xExpr,
                yExpr,
                text:rawInput,
                visible:true,
                color:colors[
                    graphs.length % colors.length
                ]
            });
        }

        /* FUNCTION */

        else {

            let expr = input;

            if(expr.startsWith("y=")){
                expr = expr.slice(2);
            }

            graphs.push({
                type:"function",
                expr:math.compile(expr),
                text:rawInput,
                visible:true,
                color:colors[
                    graphs.length % colors.length
                ]
            });
        }

        document.getElementById("expr").value="";

        render();
        draw();

    } catch(err){

        console.error(err);
        alert("Invalid expression");
    }
}

/* ENTER KEY */

document
.getElementById("expr")
.addEventListener("keydown",(e)=>{
    if(e.key==="Enter"){
        add();
    }
});

/* ================= UI ================= */

function render(){

    const list = document.getElementById("list");

    list.innerHTML = "";

    graphs.forEach((g,i)=>{

        const div = document.createElement("div");

        div.className = "item";

        div.innerHTML = `
            <div style="color:${g.color}">
                ${g.text}
            </div>

            <div class="small">
                ${g.type}
            </div>
        `;

        /* toggle */

        div.onclick = ()=>{

            g.visible = !g.visible;

            div.style.opacity =
                g.visible ? 1 : 0.35;

            draw();
        };

        /* delete */

        div.oncontextmenu = (e)=>{

            e.preventDefault();

            graphs.splice(i,1);

            render();
            draw();
        };

        list.appendChild(div);
    });
}

/* ================= GRID ================= */

function grid(){

    ctx.strokeStyle = "#1a2030";
    ctx.lineWidth = 1;

    /* vertical */

    for(
        let x = offsetX % scale;
        x < W;
        x += scale
    ){

        ctx.beginPath();
        ctx.moveTo(x,0);
        ctx.lineTo(x,H);
        ctx.stroke();
    }

    /* horizontal */

    for(
        let y = offsetY % scale;
        y < H;
        y += scale
    ){

        ctx.beginPath();
        ctx.moveTo(0,y);
        ctx.lineTo(W,y);
        ctx.stroke();
    }

    /* axes */

    ctx.strokeStyle = "#555";
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.moveTo(0,offsetY);
    ctx.lineTo(W,offsetY);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(offsetX,0);
    ctx.lineTo(offsetX,H);
    ctx.stroke();
}

/* ================= FUNCTION DRAW ================= */

function drawFunction(g){

    ctx.strokeStyle = g.color;
    ctx.lineWidth = 2;

    ctx.beginPath();

    let first = true;

    for(let px=0; px<W; px++){

        let x =
            (px - offsetX) / scale;

        let y;

        try{
            y = g.expr.evaluate({x});

            if(!isFinite(y)) continue;

        } catch{
            continue;
        }

        let py =
            offsetY - y * scale;

        if(first){

            ctx.moveTo(px,py);

            first = false;

        } else {

            ctx.lineTo(px,py);
        }
    }

    ctx.stroke();
}

/* ================= PARAMETRIC DRAW ================= */

function drawParametric(g){

    ctx.strokeStyle = g.color;
    ctx.lineWidth = 2;

    ctx.beginPath();

    let first = true;

    for(let t=-100; t<=100; t+=0.02){

        let x,y;

        try{

            x = g.xExpr.evaluate({t});
            y = g.yExpr.evaluate({t});

            if(
                !isFinite(x) ||
                !isFinite(y)
            ){
                continue;
            }

        } catch{
            continue;
        }

        let px =
            offsetX + x * scale;

        let py =
            offsetY - y * scale;

        if(first){

            ctx.moveTo(px,py);

            first = false;

        } else {

            ctx.lineTo(px,py);
        }
    }

    ctx.stroke();
}

/* ================= MAIN DRAW ================= */

function draw(){

    ctx.clearRect(0,0,W,H);

    grid();

    graphs.forEach(g=>{

        if(!g.visible) return;

        if(g.type==="function"){
            drawFunction(g);
        }

        if(g.type==="parametric"){
            drawParametric(g);
        }
    });
}

/* ================= ZOOM ================= */

canvas.addEventListener("wheel",(e)=>{

    e.preventDefault();

    const mouseX = e.offsetX;
    const mouseY = e.offsetY;

    const worldX =
        (mouseX - offsetX) / scale;

    const worldY =
        (offsetY - mouseY) / scale;

    const zoom =
        e.deltaY < 0 ? 1.1 : 0.9;

    scale *= zoom;

    offsetX =
        mouseX - worldX * scale;

    offsetY =
        mouseY + worldY * scale;

    draw();
});

/* ================= PAN ================= */

let dragging = false;

let lastX = 0;
let lastY = 0;

canvas.addEventListener("mousedown",(e)=>{

    dragging = true;

    lastX = e.clientX;
    lastY = e.clientY;
});

window.addEventListener("mouseup",()=>{

    dragging = false;
});

window.addEventListener("mousemove",(e)=>{

    if(!dragging) return;

    offsetX += e.clientX - lastX;
    offsetY += e.clientY - lastY;

    lastX = e.clientX;
    lastY = e.clientY;

    draw();
});

/* ================= START ================= */

draw();
</script>

</body>
</html>
