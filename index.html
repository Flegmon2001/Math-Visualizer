<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Mobile Graphing Studio</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

<style>
:root{
    --bg:#0b0d12;
    --panel:#121725;
    --panel2:#171c2d;
    --text:#eaeaea;
    --accent:#4c7dff;
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:var(--bg);
    color:var(--text);
    font-family:system-ui;
}

nav {
    border:none;
    background:var(--accent);
    color:white;
    border-radius:10px;
    padding:12px 16px;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
    margin: right;
}

#wrap{
    display:flex;
    width:100%;
    height:100%;
}

/* ================= SIDEBAR ================= */

#panel{
    width:320px;
    min-width:320px;
    background:var(--panel);
    border-right:1px solid #222;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

#top{
    padding:12px;
}

#title{
    font-size:20px;
    font-weight:bold;
    margin-bottom:12px;
}

#inputRow{
    display:flex;
    gap:8px;
}

input{
    flex:1;
    background:var(--panel2);
    color:white;
    border:none;
    outline:none;
    padding:12px;
    border-radius:10px;
    font-size:16px;
}

button{
    border:none;
    background:var(--accent);
    color:white;
    border-radius:10px;
    padding:12px 16px;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
}

#list{
    flex:1;
    overflow:auto;
    padding:12px;
}

.item{
    background:var(--panel2);
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    user-select:none;
}

.itemText{
    font-size:15px;
    word-break:break-word;
}

.small{
    margin-top:4px;
    opacity:0.7;
    font-size:12px;
}

/* ================= CANVAS ================= */

canvas{
    flex:1;
    display:block;
    touch-action:none;
    background:#0b0d12;
}

/* ================= MOBILE ================= */

#togglePanel{
    display:none;
    position:absolute;
    top:10px;
    left:10px;
    z-index:100;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
}

@media (max-width:900px){

    #panel{
        position:absolute;
        left:0;
        top:0;
        bottom:0;
        z-index:99;
        transform:translateX(-100%);
        transition:0.25s;
    }

    #panel.open{
        transform:translateX(0);
    }

    #togglePanel{
        display:block;
    }
}
</style>
</head>

<body>

<button id="togglePanel">☰</button>

<div id="wrap">

<div id="panel">

    <div id="top">

        <nav><a href="flegmon2001.github.io/MainFleg-Web/>Fleg-Web</a></nav>
        
        <div id="title">
            Graphing Studio
        </div>

        <div id="inputRow">

            <input
                id="expr"
                placeholder="sin(x) OR x=t*cos(t), y=t*sin(t)"
            />

            <button onclick="addGraph()">
                +
            </button>

        </div>

    </div>

    <div id="list"></div>

</div>

<canvas id="c"></canvas>

</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const panel = document.getElementById("panel");

/* ================= MOBILE PANEL ================= */

document
.getElementById("togglePanel")
.onclick = ()=>{

    panel.classList.toggle("open");
};

/* ================= SIZE ================= */

let W,H;

function resize(){

    W = canvas.width = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;

    draw();
}

window.addEventListener("resize",resize);

setTimeout(resize,50);

/* ================= VIEW ================= */

let scale = 60;

let offsetX = 0;
let offsetY = 0;

function centerView(){

    offsetX = W/2;
    offsetY = H/2;
}

centerView();

/* ================= DATA ================= */

const graphs = [];

const colors = [
    "#4c7dff",
    "#ff4c7d",
    "#4cff9a",
    "#ffb84c",
    "#c44cff",
    "#00d4ff",
    "#ff6666"
];

/* ================= HELPERS ================= */

function normalize(str){

    return str
        .replace(/\n/g,",")
        .replace(/\s/g,"");
}

/* ================= PARAMETRIC ================= */

function parseParametric(input){

    input = normalize(input);

    const parts = input.split(",");

    let xPart = null;
    let yPart = null;

    for(const p of parts){

        if(p.startsWith("x=")){
            xPart = p.slice(2);
        }

        if(p.startsWith("y=")){
            yPart = p.slice(2);
        }
    }

    if(!xPart || !yPart){

        throw new Error("Bad parametric");
    }

    return {
        xExpr:math.compile(xPart),
        yExpr:math.compile(yPart)
    };
}

/* ================= ADD GRAPH ================= */

function addGraph(){

    let raw =
        document.getElementById("expr")
        .value
        .trim();

    if(!raw) return;

    let input = normalize(raw);

    try{

        /* PARAMETRIC */

        if(
            input.includes("x=") &&
            input.includes("y=")
        ){

            const p =
                parseParametric(input);

            graphs.push({

                type:"parametric",

                xExpr:p.xExpr,
                yExpr:p.yExpr,

                text:raw,

                visible:true,

                color:
                    colors[
                        graphs.length %
                        colors.length
                    ]
            });
        }

        /* NORMAL FUNCTION */

        else {

            let expr = input;

            if(expr.startsWith("y=")){
                expr = expr.slice(2);
            }

            graphs.push({

                type:"function",

                expr:
                    math.compile(expr),

                text:raw,

                visible:true,

                color:
                    colors[
                        graphs.length %
                        colors.length
                    ]
            });
        }

        document
        .getElementById("expr")
        .value = "";

        renderList();
        draw();

    } catch(err){

        console.error(err);

        alert("Invalid expression");
    }
}

/* ENTER */

document
.getElementById("expr")
.addEventListener("keydown",(e)=>{

    if(e.key==="Enter"){
        addGraph();
    }
});

/* ================= LIST ================= */

function renderList(){

    const list =
        document.getElementById("list");

    list.innerHTML = "";

    graphs.forEach((g,i)=>{

        const div =
            document.createElement("div");

        div.className = "item";

        div.innerHTML = `

            <div
                class="itemText"
                style="color:${g.color}"
            >
                ${g.text}
            </div>

            <div class="small">
                ${g.type}
            </div>
        `;

        /* TOGGLE */

        div.onclick = ()=>{

            g.visible = !g.visible;

            div.style.opacity =
                g.visible ? 1 : 0.35;

            draw();
        };

        /* DELETE */

        div.oncontextmenu = (e)=>{

            e.preventDefault();

            graphs.splice(i,1);

            renderList();

            draw();
        };

        /* LONG PRESS DELETE MOBILE */

        let hold;

        div.addEventListener("touchstart",()=>{

            hold = setTimeout(()=>{

                graphs.splice(i,1);

                renderList();

                draw();

            },700);
        });

        div.addEventListener("touchend",()=>{

            clearTimeout(hold);
        });

        list.appendChild(div);
    });
}

/* ================= GRID ================= */

function drawGrid(){

    ctx.strokeStyle = "#1a2030";
    ctx.lineWidth = 1;

    for(
        let x = offsetX % scale;
        x < W;
        x += scale
    ){

        ctx.beginPath();

        ctx.moveTo(x,0);
        ctx.lineTo(x,H);

        ctx.stroke();
    }

    for(
        let y = offsetY % scale;
        y < H;
        y += scale
    ){

        ctx.beginPath();

        ctx.moveTo(0,y);
        ctx.lineTo(W,y);

        ctx.stroke();
    }

    /* AXES */

    ctx.strokeStyle = "#555";
    ctx.lineWidth = 2;

    ctx.beginPath();

    ctx.moveTo(0,offsetY);
    ctx.lineTo(W,offsetY);

    ctx.stroke();

    ctx.beginPath();

    ctx.moveTo(offsetX,0);
    ctx.lineTo(offsetX,H);

    ctx.stroke();
}

/* ================= FUNCTION ================= */

function drawFunction(g){

    ctx.strokeStyle = g.color;
    ctx.lineWidth = 2;

    ctx.beginPath();

    let first = true;

    for(let px=0; px<W; px++){

        let x =
            (px-offsetX)/scale;

        let y;

        try{

            y =
                g.expr.evaluate({x});

            if(!isFinite(y))
                continue;

        } catch{

            continue;
        }

        let py =
            offsetY - y*scale;

        if(first){

            ctx.moveTo(px,py);

            first = false;

        } else {

            ctx.lineTo(px,py);
        }
    }

    ctx.stroke();
}

/* ================= PARAMETRIC ================= */

function drawParametric(g){

    ctx.strokeStyle = g.color;
    ctx.lineWidth = 2;

    ctx.beginPath();

    let first = true;

    for(let t=-100; t<=100; t+=0.02){

        let x,y;

        try{

            x =
                g.xExpr.evaluate({t});

            y =
                g.yExpr.evaluate({t});

            if(
                !isFinite(x) ||
                !isFinite(y)
            ){
                continue;
            }

        } catch{

            continue;
        }

        let px =
            offsetX + x*scale;

        let py =
            offsetY - y*scale;

        if(first){

            ctx.moveTo(px,py);

            first = false;

        } else {

            ctx.lineTo(px,py);
        }
    }

    ctx.stroke();
}

/* ================= DRAW ================= */

function draw(){

    ctx.clearRect(0,0,W,H);

    drawGrid();

    graphs.forEach(g=>{

        if(!g.visible) return;

        if(g.type==="function"){
            drawFunction(g);
        }

        if(g.type==="parametric"){
            drawParametric(g);
        }
    });
}

/* ================= MOUSE PAN ================= */

let dragging = false;

let lastX = 0;
let lastY = 0;

canvas.addEventListener("mousedown",(e)=>{

    dragging = true;

    lastX = e.clientX;
    lastY = e.clientY;
});

window.addEventListener("mouseup",()=>{

    dragging = false;
});

window.addEventListener("mousemove",(e)=>{

    if(!dragging) return;

    offsetX += e.clientX - lastX;
    offsetY += e.clientY - lastY;

    lastX = e.clientX;
    lastY = e.clientY;

    draw();
});

/* ================= MOUSE ZOOM ================= */

canvas.addEventListener("wheel",(e)=>{

    e.preventDefault();

    const mouseX = e.offsetX;
    const mouseY = e.offsetY;

    const worldX =
        (mouseX-offsetX)/scale;

    const worldY =
        (offsetY-mouseY)/scale;

    const zoom =
        e.deltaY < 0 ? 1.1 : 0.9;

    scale *= zoom;

    scale =
        Math.max(5,
        Math.min(2000,scale));

    offsetX =
        mouseX - worldX*scale;

    offsetY =
        mouseY + worldY*scale;

    draw();

},{passive:false});

/* ================= TOUCH SUPPORT ================= */

let touchMode = null;

let lastTouchX = 0;
let lastTouchY = 0;

let lastPinchDistance = 0;

function touchDistance(t1,t2){

    const dx =
        t2.clientX - t1.clientX;

    const dy =
        t2.clientY - t1.clientY;

    return Math.hypot(dx,dy);
}

function touchMid(t1,t2){

    return {

        x:(t1.clientX+t2.clientX)/2,

        y:(t1.clientY+t2.clientY)/2
    };
}

/* TOUCH START */

canvas.addEventListener("touchstart",(e)=>{

    e.preventDefault();

    /* PAN */

    if(e.touches.length===1){

        touchMode = "pan";

        lastTouchX =
            e.touches[0].clientX;

        lastTouchY =
            e.touches[0].clientY;
    }

    /* ZOOM */

    else if(e.touches.length===2){

        touchMode = "zoom";

        lastPinchDistance =
            touchDistance(
                e.touches[0],
                e.touches[1]
            );
    }

},{passive:false});

/* TOUCH MOVE */

canvas.addEventListener("touchmove",(e)=>{

    e.preventDefault();

    /* PAN */

    if(
        touchMode==="pan" &&
        e.touches.length===1
    ){

        const touch =
            e.touches[0];

        const dx =
            touch.clientX-lastTouchX;

        const dy =
            touch.clientY-lastTouchY;

        offsetX += dx;
        offsetY += dy;

        lastTouchX = touch.clientX;
        lastTouchY = touch.clientY;

        draw();
    }

    /* PINCH */

    else if(
        touchMode==="zoom" &&
        e.touches.length===2
    ){

        const dist =
            touchDistance(
                e.touches[0],
                e.touches[1]
            );

        const mid =
            touchMid(
                e.touches[0],
                e.touches[1]
            );

        const zoomFactor =
            dist / lastPinchDistance;

        const worldX =
            (mid.x-offsetX)/scale;

        const worldY =
            (offsetY-mid.y)/scale;

        scale *= zoomFactor;

        scale =
            Math.max(5,
            Math.min(2000,scale));

        offsetX =
            mid.x - worldX*scale;

        offsetY =
            mid.y + worldY*scale;

        lastPinchDistance = dist;

        draw();
    }

},{passive:false});

/* TOUCH END */

canvas.addEventListener("touchend",(e)=>{

    e.preventDefault();

    if(e.touches.length===0){

        touchMode = null;
    }

    else if(e.touches.length===1){

        touchMode = "pan";

        lastTouchX =
            e.touches[0].clientX;

        lastTouchY =
            e.touches[0].clientY;
    }

},{passive:false});

/* ================= START ================= */

resize();
draw();
</script>

</body>
</html>
