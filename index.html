<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Graphing Studio (Fixed Parametric)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

<style>
:root{
    --bg:#0b0d12;
    --panel:#121725;
    --panel2:#171c2d;
    --text:#eaeaea;
    --accent:#4c7dff;
}

body{
    margin:0;
    font-family:system-ui;
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
}

#wrap{
    display:flex;
    height:100vh;
}

#panel{
    width:340px;
    background:var(--panel);
    padding:12px;
    box-sizing:border-box;
    border-right:1px solid #222;
}

#title{
    font-size:18px;
    margin-bottom:10px;
}

#inputRow{
    display:flex;
    gap:6px;
}

input{
    flex:1;
    padding:10px;
    border-radius:8px;
    border:none;
    outline:none;
    background:var(--panel2);
    color:white;
}

button{
    padding:10px;
    border-radius:8px;
    border:none;
    background:var(--accent);
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.item{
    background:var(--panel2);
    padding:10px;
    border-radius:10px;
    margin-top:8px;
    cursor:pointer;
}

.small{
    font-size:12px;
    opacity:0.7;
}

canvas{
    flex:1;
    display:block;
}
</style>
</head>

<body>

<div id="wrap">

<div id="panel">
    <div id="title">Graphing Studio FIX</div>

    <div id="inputRow">
        <input id="expr" placeholder="sin(x) OR x=t*cos(t), y=t*sin(t)" />
        <button onclick="add()">+</button>
    </div>

    <div id="list"></div>
</div>

<canvas id="c"></canvas>

</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W,H;
function resize(){
    W = canvas.width = window.innerWidth - 340;
    H = canvas.height = window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

// view
let scale = 60;
let offsetX = W/2;
let offsetY = H/2;

// graphs
let graphs = [];

const colors = ["#4c7dff","#ff4c7d","#4cff9a","#ffb84c","#c44cff"];

/* ---------------- PARAMETRIC PARSER FIX ---------------- */

function parseParametric(input){

    input = input.replace(/\s/g,'');

    const parts = input.split(",");

    let xPart = null;
    let yPart = null;

    for(const p of parts){
        if(p.startsWith("x=")) xPart = p.slice(2);
        if(p.startsWith("y=")) yPart = p.slice(2);
    }

    if(!xPart || !yPart){
        throw new Error("Parametric must be x=..., y=...");
    }

    return {
        xExpr: math.compile(xPart),
        yExpr: math.compile(yPart)
    };
}

/* ---------------- ADD FUNCTION ---------------- */

function add(){
    let input = document.getElementById("expr").value.trim();
    if(!input) return;

    try{

        // PARAMETRIC MODE
        if(input.includes("x=") && input.includes("y=") && input.includes("t")){

            const {xExpr, yExpr} = parseParametric(input);

            graphs.push({
                type:"parametric",
                xExpr,
                yExpr,
                text:input,
                visible:true,
                color:colors[graphs.length % colors.length]
            });

        } 
        // FUNCTION MODE
        else {

            let expr = input.replace("y=","");

            graphs.push({
                type:"function",
                expr:math.compile(expr),
                text:input,
                visible:true,
                color:colors[graphs.length % colors.length]
            });
        }

        document.getElementById("expr").value="";
        render();
        draw();

    } catch(e){
        alert("Invalid expression");
    }
}

/* ---------------- UI ---------------- */

function render(){
    const list = document.getElementById("list");
    list.innerHTML="";

    graphs.forEach((g,i)=>{

        const div=document.createElement("div");
        div.className="item";
        div.innerHTML=`
            <div>${g.text}</div>
            <div class="small">${g.type}</div>
        `;

        div.onclick=()=>{
            g.visible=!g.visible;
            div.style.opacity=g.visible?1:0.4;
            draw();
        };

        div.oncontextmenu=(e)=>{
            e.preventDefault();
            graphs.splice(i,1);
            render();
            draw();
        };

        list.appendChild(div);
    });
}

/* ---------------- DRAW GRID ---------------- */

function grid(){

    ctx.strokeStyle="#1a2030";
    ctx.lineWidth=1;

    for(let x=offsetX%scale;x<W;x+=scale){
        ctx.beginPath();
        ctx.moveTo(x,0);
        ctx.lineTo(x,H);
        ctx.stroke();
    }

    for(let y=offsetY%scale;y<H;y+=scale){
        ctx.beginPath();
        ctx.moveTo(0,y);
        ctx.lineTo(W,y);
        ctx.stroke();
    }

    ctx.strokeStyle="#444";
    ctx.lineWidth=2;

    ctx.beginPath();
    ctx.moveTo(0,offsetY);
    ctx.lineTo(W,offsetY);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(offsetX,0);
    ctx.lineTo(offsetX,H);
    ctx.stroke();
}

/* ---------------- FUNCTION GRAPH ---------------- */

function drawFunc(g){
    ctx.strokeStyle=g.color;
    ctx.lineWidth=2;
    ctx.beginPath();

    let first=true;

    for(let px=0;px<W;px++){

        let x=(px-offsetX)/scale;
        let y;

        try{
            y=g.expr.evaluate({x});
        } catch{
            continue;
        }

        let py=offsetY-y*scale;

        if(first){
            ctx.moveTo(px,py);
            first=false;
        } else ctx.lineTo(px,py);
    }

    ctx.stroke();
}

/* ---------------- PARAMETRIC GRAPH (FIXED) ---------------- */

function drawParam(g){
    ctx.strokeStyle=g.color;
    ctx.lineWidth=2;
    ctx.beginPath();

    let first=true;

    for(let t=-50;t<50;t+=0.05){

        let x=g.xExpr.evaluate({t});
        let y=g.yExpr.evaluate({t});

        let px=offsetX+x*scale;
        let py=offsetY-y*scale;

        if(first){
            ctx.moveTo(px,py);
            first=false;
        } else ctx.lineTo(px,py);
    }

    ctx.stroke();
}

/* ---------------- MAIN DRAW ---------------- */

function draw(){
    ctx.clearRect(0,0,W,H);

    grid();

    graphs.forEach(g=>{
        if(!g.visible) return;

        if(g.type==="function") drawFunc(g);
        if(g.type==="parametric") drawParam(g);
    });
}

draw();

/* ---------------- ZOOM ---------------- */

canvas.addEventListener("wheel",(e)=>{
    e.preventDefault();
    scale*=e.deltaY<0?1.1:0.9;
    draw();
});

/* ---------------- PAN ---------------- */

let drag=false,lx,ly;

canvas.addEventListener("mousedown",(e)=>{
    drag=true;
    lx=e.clientX;
    ly=e.clientY;
});

canvas.addEventListener("mouseup",()=>drag=false);

canvas.addEventListener("mousemove",(e)=>{
    if(!drag)return;

    offsetX+=e.clientX-lx;
    offsetY+=e.clientY-ly;

    lx=e.clientX;
    ly=e.clientY;

    draw();
});
</script>

</body>
</html>
